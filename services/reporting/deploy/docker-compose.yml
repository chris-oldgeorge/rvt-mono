services:
  reporting:
    build:
      context: ..
      dockerfile: src/Rvt.Reporting.Service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ReportingDatabase: Host=timescale;Port=5432;Database=rvt;Username=postgres;Password=postgres
      RVT__SERVICE_NAME: RVT Reporting
      RVT__SERVICE_VERSION: local
      RVT__EMAIL_ENABLED: "false"
      RVT__INTERNAL_API_KEY: local-dev-key
      RVT__SPA_BACKEND_BASE_URL: ""
      RVT__SPA_REPORT_CONTENT_API_KEY: local-report-content-key
      RVT__AI_SUMMARY_ENABLED: "false"
      RVT__AI_SUMMARY_BASE_URL: http://host.docker.internal:11434
      RVT__AI_SUMMARY_MODEL: llama3.2
      RVT__AI_SUMMARY_TIMEOUT_SECONDS: "8"
      RVT__BLOB_REPORT_CONTAINER_NAME: pdfreports
      Quartz__ScheduledReportsCron: 0 0 1-6 ? * * *
      Quartz__TimeZone: UTC
    depends_on:
      - timescale

  timescale:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: rvt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data

volumes:
  timescale-data:
